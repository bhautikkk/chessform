<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Leaderboard - ChessBird</title>
    <meta name="description" content="Live tournament standings for ChessBird chess tournament.">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <!-- Icons & Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #09090b;
            --bg-accent: #18181b;
            --card: rgba(24, 24, 27, 0.5);
            --card-border: rgba(255, 255, 255, 0.08);
            --gold: #f59e0b;
            --gold-light: #fbbf24;
            --silver: #e4e4e7;
            --bronze: #d97706;
            --text: #fafafa;
            --muted: #a1a1aa;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(245, 158, 11, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.02) 0%, transparent 100%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Hero Section */
        .hero-section {
            text-align: center;
            padding: 80px 20px 40px;
            position: relative;
        }
        
        .hero-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .hero-section h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }

        .hero-section h1 i {
            color: var(--gold);
            -webkit-text-fill-color: var(--gold);
            margin-right: 16px;
            filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.4));
        }

        .hero-section p {
            color: var(--primary);
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
        }
        
        .live-indicator .dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse-green 1.5s infinite;
        }
        
        @keyframes pulse-green {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.6; box-shadow: 0 0 15px var(--success); }
            100% { transform: scale(0.95); opacity: 1; }
        }

        .leaderboard-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        /* Closed Layout (Premium) */
        .closed-overlay {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 80px 40px;
            text-align: center;
            max-width: 600px;
            margin: 40px auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .closed-overlay::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.05), transparent 70%);
            pointer-events: none;
        }

        .lock-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
        }

        .lock-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .closed-overlay i {
            font-size: 3rem;
            color: var(--danger);
            position: relative;
            z-index: 2;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        .closed-overlay h2 {
            font-size: 2.2rem;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 16px;
            color: #fff;
        }

        .closed-overlay p {
            color: var(--muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .glass-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin: 30px 0;
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.03);
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 0.9rem;
            color: var(--muted);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--danger);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--danger);
            animation: blink 1.5s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Round Tabs */
        .round-tabs {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            overflow-y: visible;
            padding: 10px 4px 20px;
            margin-bottom: 40px;
            justify-content: center;
        }
        .round-tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            background: rgba(24, 24, 27, 0.8);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--muted);
            border-radius: 16px;
            padding: 14px 32px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            backdrop-filter: blur(10px);
        }
        .tab-btn:hover { 
            background: rgba(255,255,255,0.05); 
            color: #fff; 
            transform: translateY(-2px); 
            border-color: rgba(255,255,255,0.15);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(59, 130, 246, 0.05) 100%);
            border-color: rgba(59, 130, 246, 0.5);
            color: var(--primary);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.15);
            transform: translateY(-2px);
        }

        /* Table (Cards Style) */
        .lb-table-wrapper { width: 100%; perspective: 1000px; }
        .lb-table { width: 100%; border-collapse: separate; border-spacing: 0 16px; text-align: left; }
        
        .lb-table th {
            padding: 0 24px 12px;
            color: var(--muted);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            border: none;
            background: transparent;
        }
        
        .lb-table td {
            padding: 24px;
            background: var(--card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            vertical-align: middle;
            border-top: 1px solid var(--card-border);
            border-bottom: 1px solid var(--card-border);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lb-table td:first-child { border-left: 1px solid var(--card-border); border-radius: 20px 0 0 20px; width: 90px; }
        .lb-table td:last-child { border-right: 1px solid var(--card-border); border-radius: 0 20px 20px 0; }

        .lb-table tbody tr {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .lb-table tbody tr:hover td { 
            background: rgba(39, 39, 42, 0.9); 
            border-color: rgba(255,255,255,0.15); 
        }
        .lb-table tbody tr:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        /* Ranks */
        .rank-badge {
            display: flex; align-items: center; justify-content: center;
            width: 48px; height: 48px; border-radius: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 900; font-size: 1.3rem;
            background: rgba(255,255,255,0.05); color: var(--muted);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Gold Rank (1st) */
        tr.rank-1 td { 
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, rgba(24, 24, 27, 0.8) 100%); 
            border-color: rgba(245, 158, 11, 0.3); 
        }
        tr.rank-1:hover td { border-color: rgba(245, 158, 11, 0.6); }
        tr.rank-1 .rank-badge { 
            background: linear-gradient(135deg, #fcd34d 0%, #d97706 100%); 
            color: #fff; 
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.4); 
            border: none; 
            font-size: 1.6rem; 
        }
        tr.rank-1 .player-name { color: var(--gold-light); text-shadow: 0 0 15px rgba(245, 158, 11, 0.4); font-size: 1.3rem; }
        
        /* Silver Rank (2nd) */
        tr.rank-2 td { background: linear-gradient(90deg, rgba(228, 228, 231, 0.08) 0%, rgba(24, 24, 27, 0.8) 100%); border-color: rgba(228, 228, 231, 0.2); }
        tr.rank-2:hover td { border-color: rgba(228, 228, 231, 0.4); }
        tr.rank-2 .rank-badge { background: linear-gradient(135deg, #f4f4f5 0%, #a1a1aa 100%); color: #18181b; border: none; font-size: 1.5rem; box-shadow: 0 0 20px rgba(228, 228, 231, 0.3); }
        tr.rank-2 .player-name { color: var(--silver); font-size: 1.2rem; }
        
        /* Bronze Rank (3rd) */
        tr.rank-3 td { background: linear-gradient(90deg, rgba(217, 119, 6, 0.08) 0%, rgba(24, 24, 27, 0.8) 100%); border-color: rgba(217, 119, 6, 0.2); }
        tr.rank-3:hover td { border-color: rgba(217, 119, 6, 0.4); }
        tr.rank-3 .rank-badge { background: linear-gradient(135deg, #fbbf24 0%, #b45309 100%); color: #fff; border: none; font-size: 1.4rem; box-shadow: 0 0 20px rgba(217, 119, 6, 0.3); }
        tr.rank-3 .player-name { color: var(--bronze); font-size: 1.15rem; }

        .player-name { font-weight: 800; color: #fff; font-size: 1.15rem; display: flex; align-items: center; gap: 12px; }
        .player-handle { font-size: 0.9rem; color: rgba(255,255,255,0.4); font-weight: 600; font-family: 'Inter', sans-serif; letter-spacing: 0.5px; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 8px; }

        .rating-col { color: rgba(255,255,255,0.7); font-weight: 600; font-family: 'Outfit', sans-serif; letter-spacing: 1px; font-size: 1.15rem; }

        .status-badge {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; padding: 8px 16px; border-radius: 10px;
            font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .status-won    { color: var(--success); border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.1); box-shadow: 0 0 20px rgba(16,185,129,0.2); }
        .status-draw   { color: var(--gold); border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.1); box-shadow: 0 0 20px rgba(245,158,11,0.2); }
        .status-lose   { color: var(--danger); border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); }
        .status-active { color: var(--primary); border-color: rgba(59,130,246,0.4); background: rgba(59,130,246,0.1); box-shadow: 0 0 20px rgba(59,130,246,0.2); }

        .pts-col { font-family: 'Outfit', sans-serif; font-size: 1.7rem; font-weight: 900; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        tr.rank-1 .pts-col { color: var(--gold-light); text-shadow: 0 0 25px rgba(245, 158, 11, 0.6); }
        tr.rank-2 .pts-col { color: var(--silver); }
        tr.rank-3 .pts-col { color: var(--bronze); }

        .spinner-ring {
            width: 56px; height: 56px;
            border: 4px solid rgba(255,255,255,0.05); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 768px) {
            .hero-section { padding: 60px 16px 30px; }
            .hero-section h1 { font-size: 2.8rem; }
            .hero-section p { font-size: 0.9rem; letter-spacing: 2px; }
            
            .leaderboard-container { padding: 0 5px 40px; }
            
            .round-tabs {
                justify-content: flex-start;
                padding-left: 10px;
                padding-right: 10px;
                -webkit-overflow-scrolling: touch;
            }
            
            .closed-overlay { padding: 50px 20px; margin: 20px; border-radius: 24px; }
            .closed-overlay i { font-size: 2.5rem; }
            .closed-overlay h2 { font-size: 1.8rem; }
            .closed-overlay p { font-size: 1rem; }
            
            .lb-table-wrapper { overflow-x: hidden; padding-bottom: 20px; }
            .lb-table { border-spacing: 0 8px; width: 100%; min-width: unset; table-layout: fixed; }
            
            .lb-table th { padding: 0 4px 6px; font-size: 0.6rem; letter-spacing: 1px; text-align: center; }
            .lb-table th:nth-child(2) { text-align: left; }
            .lb-table th:nth-child(1) { width: 14%; } /* Rank */
            .lb-table th:nth-child(2) { width: 33%; } /* Player */
            .lb-table th:nth-child(3) { width: 16%; } /* Rating */
            .lb-table th:nth-child(4) { width: 15%; } /* Points */
            .lb-table th:nth-child(5) { width: 22%; } /* Status */
            
            .lb-table td { padding: 10px 4px; text-align: center; overflow: hidden; text-overflow: ellipsis; }
            .lb-table td:nth-child(2) { text-align: left; }
            
            .lb-table td:first-child { width: auto; border-radius: 12px 0 0 12px; }
            .lb-table td:last-child { border-radius: 0 12px 12px 0; }
            
            .rank-badge { width: 28px; height: 28px; font-size: 0.85rem; border-radius: 8px; margin: 0 auto; }
            tr.rank-1 .rank-badge { font-size: 1rem; }
            
            .player-name { font-size: 0.85rem; gap: 2px; flex-direction: column; align-items: flex-start; word-wrap: break-word; }
            tr.rank-1 .player-name { font-size: 0.95rem; }
            .player-handle { display: none; }
            
            .rating-col { font-size: 0.85rem; }
            
            .status-badge { padding: 4px 6px; font-size: 0.55rem; letter-spacing: 0.5px; border-radius: 6px; gap: 4px; display: inline-flex; width: max-content; }
            
            .pts-col { font-size: 1.1rem; }
        }

        @media (max-width: 480px) {
            .hero-section h1 { font-size: 2.2rem; }
            .hero-section p { font-size: 0.75rem; }
            .tab-btn { padding: 8px 16px; font-size: 0.85rem; }
            
            .lb-table th { font-size: 0.5rem; letter-spacing: 0px; }
            .player-name { font-size: 0.75rem; }
            tr.rank-1 .player-name { font-size: 0.85rem; }
            .rating-col { font-size: 0.75rem; }
            .pts-col { font-size: 1rem; }
            .status-badge { padding: 3px 5px; font-size: 0.5rem; gap: 2px;}
            .status-badge i { font-size: 5px !important; }
            .rank-badge { width: 24px; height: 24px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <img id="siteLogoImg" src="header_logo.png" alt="Chess Bird" style="height: 64px; margin-bottom: 12px; filter: drop-shadow(0 0 12px rgba(245, 158, 11, 0.4));">
        <h1>Leaderboard</h1>
        <p>Live Tournament Standings</p>
        <div class="live-indicator">
            <div class="dot"></div> Live Updates
        </div>
    </div>

    <div class="leaderboard-container">

        <!-- Loading state -->
        <div id="loading" style="text-align:center; padding:50px;">
            <div class="spinner-ring"></div>
            <p id="loadingText" style="color:#71717a; font-size:13px; margin-top:16px;">Connecting to Firebase...</p>
        </div>

        <!-- Leaderboard closed / error -->
        <div id="closedLayout" class="closed-overlay" style="display:none;">
            <div class="lock-wrapper">
                <div class="lock-pulse"></div>
                <i class="fas fa-lock" id="closedIcon"></i>
            </div>
            <h2 id="closedTitle">Tournament Starts Soon!</h2>
            <p id="closedMsg">The game hasn't started yet. The live leaderboard will be revealed on match day. Stay tuned!</p>
            <div class="glass-divider"></div>
            <div class="status-indicator">
                <div class="status-dot"></div> Waiting for match day...
            </div>
        </div>

        <!-- Leaderboard open -->
        <div id="openLayout" style="display:none;">
            <div class="round-tabs" id="roundTabs"></div>
            <div class="lb-table-wrapper">
                <table class="lb-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Player</th>
                            <th class="rating-header">Rating</th>
                            <th>Points</th>
                            <th id="buchholzHeader" style="display:none;">Buchholz</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="lbTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // db is already declared globally in firebase-config.js — do NOT redeclare here
        let allPlayers = [];
        let activeRoundTab = 1;
        let leaderboardListenerAttached = false;
        let currentTournamentMode = 'elementary'; // 'elementary' | 'swiss'

        function escHtml(unsafe) {
            if (unsafe === null || unsafe === undefined) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ── 1. Timeout: if Firebase doesn't respond in 6s, show error ──
        const loadingTimeout = setTimeout(() => {
            if (document.getElementById('loading').style.display !== 'none') {
                document.getElementById('loading').style.display = 'none';
                const lockPulse = document.querySelector('.lock-pulse');
                if(lockPulse) lockPulse.style.display = 'none';
                document.getElementById('closedIcon').className = 'fas fa-triangle-exclamation';
                document.getElementById('closedIcon').style.color = 'var(--gold)';
                document.getElementById('closedTitle').textContent = 'Firebase Rules Not Deployed';
                document.getElementById('closedMsg').innerHTML = `
                    <div style="background: rgba(245, 158, 11, 0.1); padding: 20px; border-radius: 16px; border: 1px solid rgba(245, 158, 11, 0.2); margin-top: 10px; color: #fcd34d; text-align: left; font-size: 0.95rem;">
                        Firebase Console mein rules deploy nahi hui hain.<br><br>
                        <strong style="color:#fff;">Fix karo:</strong><br>
                        1. <a href="https://console.firebase.google.com" target="_blank" style="color:var(--primary); text-decoration:none;">console.firebase.google.com</a> jao<br>
                        2. Project → Firestore → <strong style="color:#fff;">Rules</strong> tab<br>
                        3. <code style="background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:6px; font-size:0.85rem; display:inline-block; margin:6px 0; border: 1px solid rgba(255,255,255,0.1);">allow read: if docId == "global"</code> wali rules paste karo<br>
                        4. <strong style="color:#fff;">Publish</strong> karo
                    </div>
                `;
                document.getElementById('closedLayout').style.display = 'flex';
                document.getElementById('closedLayout').style.textAlign = 'left';
            }
        }, 6000);

        // ── 2. Watch global settings ──────────────────────────────────
        db.collection('settings').doc('global').onSnapshot((doc) => {
            clearTimeout(loadingTimeout);
            document.getElementById('loading').style.display = 'none';

            if (doc.exists && doc.data().isLeaderboardOpen) {
                currentTournamentMode = doc.data().tournamentMode || 'elementary';
                // Show/hide Buchholz column header
                const buchHeader = document.getElementById('buchholzHeader');
                if (buchHeader) buchHeader.style.display = currentTournamentMode === 'swiss' ? '' : 'none';
                // Mode badge in hero
                let badge = document.getElementById('modeBadge');
                if (!badge) {
                    badge = document.createElement('div');
                    badge.id = 'modeBadge';
                    badge.style.cssText = 'display:inline-flex;align-items:center;gap:8px;padding:5px 14px;border-radius:100px;font-size:0.8rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-top:10px;margin-left:10px;';
                    document.querySelector('.live-indicator').insertAdjacentElement('afterend', badge);
                }
                if (currentTournamentMode === 'swiss') {
                    badge.style.background = 'rgba(59,130,246,0.12)';
                    badge.style.border = '1px solid rgba(59,130,246,0.35)';
                    badge.style.color = '#60a5fa';
                    badge.innerHTML = '<i class="fas fa-chess-knight"></i> Swiss Pairing';
                } else {
                    badge.style.background = 'rgba(198,168,124,0.1)';
                    badge.style.border = '1px solid rgba(198,168,124,0.3)';
                    badge.style.color = '#c6a87c';
                    badge.innerHTML = '<i class="fas fa-chess-board"></i> Elementary';
                }
                document.getElementById('closedLayout').style.display = 'none';
                document.getElementById('openLayout').style.display  = 'block';
                startLeaderboardListener();
                renderTabsAndData(); // Re-render if mode changed
            } else {
                document.getElementById('closedLayout').style.display = 'flex';
                document.getElementById('openLayout').style.display  = 'none';
            }
        }, (err) => {
            clearTimeout(loadingTimeout);
            document.getElementById('loading').style.display = 'none';
            const lockPulse = document.querySelector('.lock-pulse');
            if(lockPulse) lockPulse.style.display = 'none';
            document.getElementById('closedIcon').className = 'fas fa-triangle-exclamation';
            document.getElementById('closedIcon').style.color = 'var(--danger)';
            document.getElementById('closedTitle').textContent = 'Permission Denied';
            document.getElementById('closedMsg').innerHTML = `
                <div style="background: rgba(239, 68, 68, 0.1); padding: 15px; border-radius: 12px; border: 1px solid rgba(239, 68, 68, 0.2); margin-top: 10px; color: #fca5a5;">
                    Error: <code style="background:rgba(0,0,0,0.3); padding:2px 6px; border-radius:4px;">${escHtml(err.code)}</code><br>Firebase Console mein Firestore Rules deploy karo.
                </div>
            `;
            document.getElementById('closedLayout').style.display = 'flex';
            console.error('Settings read error:', err.code, err.message);
        });

        // ── 2. Listen for player data ─────────────────────────────────
        function startLeaderboardListener() {
            if (leaderboardListenerAttached) return; // prevent duplicate listeners
            leaderboardListenerAttached = true;

            db.collection('registrations').onSnapshot((snapshot) => {
                allPlayers = [];
                snapshot.forEach(doc => allPlayers.push(doc.data()));
                renderTabsAndData();
            }, (err) => {
                console.error('Registrations read error:', err.code, err.message);
                document.getElementById('lbTableBody').innerHTML =
                    `<tr><td colspan="5" style="text-align:center;padding:30px;color:#ef4444;">
                        <i class="fas fa-exclamation-circle"></i> Failed to load data.<br>
                        <small style="color:#71717a;">Error: ${escHtml(err.message)}</small>
                    </td></tr>`;
            });
        }

        function renderTabsAndData() {
            if (allPlayers.length === 0) {
                document.getElementById('roundTabs').innerHTML = '';
                document.getElementById('lbTableBody').innerHTML =
                    '<tr><td colspan="6" style="text-align:center;padding:30px;color:#71717a;">No players registered yet.</td></tr>';
                return;
            }

            // Find the highest round any player has reached
            let maxRound = 1;
            allPlayers.forEach(p => {
                const r = p.currentRound || 1;
                if (r > maxRound) maxRound = r;
            });

            if (activeRoundTab > maxRound) activeRoundTab = maxRound;

            // Build tabs
            const tabsEl = document.getElementById('roundTabs');
            tabsEl.innerHTML = '';
            
            if (currentTournamentMode === 'swiss') {
                tabsEl.style.display = 'none';
                activeRoundTab = maxRound; // Always use latest round for status
            } else {
                tabsEl.style.display = 'flex';

                // Detect which rounds have winners (to label tab as 'Winners')
                const winnerRoundsSet = new Set();
                allPlayers.forEach(p => {
                    const ms = p.matchStatus || {};
                    for (const rStr in ms) {
                        if (ms[rStr] && ms[rStr].startsWith('winner_')) {
                            // The NEXT round (rStr+1) is the Winners tab
                            winnerRoundsSet.add(parseInt(rStr) + 1);
                        }
                    }
                });

                for (let i = 1; i <= maxRound; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'tab-btn' + (i === activeRoundTab ? ' active' : '');
                    btn.textContent = winnerRoundsSet.has(i) ? '🏆 Winners' : 'Round ' + i;
                    btn.onclick = () => { activeRoundTab = i; renderTabsAndData(); };
                    tabsEl.appendChild(btn);
                }
            }

            // ── Swiss Mode: Buchholz calculation ──────────────────────
            // Buchholz = sum of all opponents' current total points
            const playerMap = {};
            allPlayers.forEach(p => { playerMap[p.phone || p.docId || p.name] = p; });

            function calcBuchholz(player) {
                const ms = player.matchStatus || {};
                // In Swiss mode, matchStatus keys are 'r1', 'r2', etc.
                // We need to find opponent for each round from pairings — but since we can't
                // do async here, we use opponent points stored in pairing data.
                // As a simple Buchholz fallback: sum of rating of opponents divided by 100
                // Real Buchholz requires pairings — use stored buchholz if available
                return parseFloat(player.buchholz) || 0;
            }

            // ── Sorting ───────────────────────────────────────────────
            let players;
            if (currentTournamentMode === 'swiss') {
                // Swiss: ALL players visible (no elimination), sort by points then buchholz then rating
                players = [...allPlayers];
                players.sort((a, b) => {
                    const pa = parseFloat(a.points) || 0, pb = parseFloat(b.points) || 0;
                    if (pb !== pa) return pb - pa;
                    const ba = calcBuchholz(a), bb = calcBuchholz(b);
                    if (bb !== ba) return bb - ba;
                    return (parseInt(b.rating) || 0) - (parseInt(a.rating) || 0);
                });
            } else {
                // Elementary: filter by round (lose wale next rounds mein nahi aayenge)
                players = allPlayers.filter(p => (p.currentRound || 1) >= activeRoundTab);

                // Check if this is a Winners tab (prev round had winners)
                const isWinnersTab = allPlayers.some(p => {
                    const prevSt = (p.matchStatus || {})[activeRoundTab - 1];
                    return prevSt && prevSt.startsWith('winner_');
                });

                players.sort((a, b) => {
                    // In winners tab, sort by winner rank from prev round
                    if (isWinnersTab) {
                        const stA = (a.matchStatus || {})[activeRoundTab - 1];
                        const stB = (b.matchStatus || {})[activeRoundTab - 1];
                        const isWA = stA && stA.startsWith('winner_');
                        const isWB = stB && stB.startsWith('winner_');
                        if (isWA && isWB) return parseInt(stA.split('_')[1]) - parseInt(stB.split('_')[1]);
                        if (isWA) return -1;
                        if (isWB) return 1;
                    }
                    // Sort by winner_X in current round first
                    const stA = (a.matchStatus || {})[activeRoundTab];
                    const stB = (b.matchStatus || {})[activeRoundTab];
                    const isWA = stA && stA.startsWith('winner_');
                    const isWB = stB && stB.startsWith('winner_');
                    if (isWA && isWB) return parseInt(stA.split('_')[1]) - parseInt(stB.split('_')[1]);
                    if (isWA) return -1;
                    if (isWB) return 1;

                    const pa = parseFloat(a.points) || 0, pb = parseFloat(b.points) || 0;
                    if (pb !== pa) return pb - pa;
                    return (parseInt(b.rating) || 0) - (parseInt(a.rating) || 0);
                });
            }

            const tbody = document.getElementById('lbTableBody');
            tbody.innerHTML = '';
            const isSwiss = currentTournamentMode === 'swiss';

            if (players.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${isSwiss ? 6 : 5}" style="text-align:center;padding:30px;color:#71717a;">No players have reached this round yet.</td></tr>`;
                return;
            }

            players.forEach((p, index) => {
                const statusMap  = p.matchStatus || {};
                const roundKey   = isSwiss ? ('r' + activeRoundTab) : activeRoundTab;
                const statusVal  = statusMap[roundKey];
                const totalPts   = parseFloat(p.points || 0);
                const buch       = calcBuchholz(p);

                // Check if this is a winners tab (based on prev round status)
                const isWinnersTab = allPlayers.some(pp => {
                    const prevSt = (pp.matchStatus || {})[activeRoundTab - 1];
                    return prevSt && prevSt.startsWith('winner_');
                });

                let badgeClass = 'status-active', badgeText = 'Playing';

                if (isWinnersTab) {
                    // In winners tab: show winner rank from PREVIOUS round
                    const prevSt = statusMap[activeRoundTab - 1];
                    if (prevSt && prevSt.startsWith('winner_')) {
                        const rank = prevSt.split('_')[1];
                        badgeClass = 'status-won';
                        badgeText = '🏆 Winner ' + rank;
                    } else {
                        badgeClass = 'status-active';
                        badgeText = 'Playing';
                    }
                } else {
                    if (statusVal === 'won')  { badgeClass = 'status-won';  badgeText = 'Won'; }
                    if (statusVal === 'draw') { badgeClass = 'status-draw'; badgeText = 'Draw'; }
                    if (statusVal === 'lose' || statusVal === 'lose_next') { badgeClass = 'status-lose'; badgeText = 'Eliminated'; }
                    if (statusVal === 'bye')  { badgeClass = 'status-draw'; badgeText = 'BYE'; }
                    if (statusVal && statusVal.startsWith('winner_')) {
                        // In the round where winner was clicked: show 'Won'
                        badgeClass = 'status-won';
                        badgeText = 'Won ⭐';
                    }
                }

                const rankIndicator = index < 3 ? ['1','2','3'][index] : index + 1;
                const rowClass  = index < 3 ? `rank-${index + 1}` : '';
                const animDelay = index * 0.05;

                tbody.innerHTML += `
                    <tr class="${rowClass}" style="animation-delay: ${animDelay}s">
                        <td><div class="rank-badge">${index < 3 ? (index===0?'<i class="fas fa-trophy"></i>':index===1?'<i class="fas fa-medal"></i>':'<i class="fas fa-award"></i>') : rankIndicator}</div></td>
                        <td>
                            <div class="player-name">
                                ${escHtml(p.name || 'Unknown')}
                                ${(p.username && p.username.toLowerCase() !== 'no account') ? `<span class="player-handle">@${escHtml(p.username)}</span>` : ''}
                            </div>
                        </td>
                        <td class="rating-col">${escHtml(String(p.rating || '—'))}</td>
                        <td class="pts-col">${totalPts}</td>
                        ${isSwiss ? `<td class="pts-col" style="font-size:1.1rem; color:var(--muted);">${buch > 0 ? buch.toFixed(1) : '—'}</td>` : ''}
                        <td><span class="status-badge ${badgeClass}"><i class="fas fa-circle" style="font-size:8px;"></i> ${badgeText}</span></td>
                    </tr>`;
            });
        }
        // ── Load Custom Logo from Firestore ──────────────────────────
        (function loadSiteLogo() {
            function tryLoad() {
                if (typeof db === 'undefined') { setTimeout(tryLoad, 400); return; }
                db.collection('settings').doc('global').get().then(function(doc) {
                    if (doc.exists && doc.data().logoBase64) {
                        var img = document.getElementById('siteLogoImg');
                        if (img) img.src = doc.data().logoBase64;
                    }
                }).catch(function(){});
            }
            tryLoad();
        })();
    </script>
</body>
