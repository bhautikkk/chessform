<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Leaderboard - ChessBird</title>
    <meta name="description" content="Live tournament standings for ChessBird chess tournament.">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <!-- Icons & Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #050505;
            --card:    rgba(24, 24, 27, 0.6);
            --border:  rgba(255,255,255,0.03);
            --gold:    #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.2);
            --silver:  #c0c0c0;
            --bronze:  #cd7f32;
            --text:    #f4f4f5;
            --muted:   #8a8a93;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 15% 0%, rgba(212, 175, 55, 0.12), transparent 45%),
                radial-gradient(circle at 85% 100%, rgba(59, 130, 246, 0.08), transparent 45%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
        }

        /* Nav/Header Area */
        .hero-section {
            text-align: center;
            padding: 80px 20px 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            border-bottom: 1px solid rgba(255,255,255,0.02);
            margin-bottom: 50px;
        }

        .hero-section h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .hero-section p {
            color: var(--muted);
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .leaderboard-container {
            max-width: 1050px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        .closed-overlay { padding: 80px 20px; text-align: center; }
        .closed-overlay i { font-size: 4rem; color: var(--muted); margin-bottom: 24px; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .closed-overlay h2 { font-size: 2rem; font-family: 'Outfit', sans-serif; margin-bottom: 12px; }

        /* Round Tabs */
        .round-tabs {
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 20px;
            margin-bottom: 40px; justify-content: center;
        }
        .round-tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--muted);
            border-radius: 12px;
            padding: 12px 30px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.06); color: #fff; transform: translateY(-2px); }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(212, 175, 55, 0.05) 100%);
            border-color: rgba(212, 175, 55, 0.5);
            color: var(--gold);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.15);
        }

        /* Table (Cards Style) */
        .lb-table-wrapper { width: 100%; }
        .lb-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; text-align: left; }
        
        .lb-table th {
            padding: 0 24px 12px;
            color: var(--muted);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border: none;
            background: transparent;
        }
        
        .lb-table td {
            padding: 22px 24px;
            background: var(--card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            vertical-align: middle;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lb-table td:first-child { border-left: 1px solid var(--border); border-radius: 16px 0 0 16px; width: 80px; }
        .lb-table td:last-child { border-right: 1px solid var(--border); border-radius: 0 16px 16px 0; }

        .lb-table tbody tr {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .lb-table tbody tr:hover td { background: rgba(39, 39, 42, 0.8); border-color: rgba(255,255,255,0.08); }
        .lb-table tbody tr:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
            z-index: 10;
        }

        /* Ranks */
        .rank-badge {
            display: flex; align-items: center; justify-content: center;
            width: 44px; height: 44px; border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-weight: 900; font-size: 1.2rem;
            background: rgba(255,255,255,0.03); color: var(--muted);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        tr.rank-1 td { background: linear-gradient(90deg, rgba(212,175,55,0.12) 0%, rgba(24,24,27,0.8) 100%); border-color: rgba(212,175,55,0.25); }
        tr.rank-1 .rank-badge { background: linear-gradient(135deg, #fceabb 0%, #f8b500 100%); color: #000; box-shadow: 0 0 25px rgba(248,181,0,0.5); border: none; font-size: 1.5rem; }
        tr.rank-1 .player-name { color: var(--gold); text-shadow: 0 0 10px rgba(212,175,55,0.3); font-size: 1.25rem; }
        
        tr.rank-2 td { background: linear-gradient(90deg, rgba(192,192,192,0.08) 0%, rgba(24,24,27,0.8) 100%); border-color: rgba(192,192,192,0.2); }
        tr.rank-2 .rank-badge { background: linear-gradient(135deg, #e0e0e0 0%, #9e9e9e 100%); color: #000; border: none; font-size: 1.4rem; box-shadow: 0 0 15px rgba(192,192,192,0.3); }
        tr.rank-2 .player-name { color: var(--silver); font-size: 1.15rem; }
        
        tr.rank-3 td { background: linear-gradient(90deg, rgba(205,127,50,0.1) 0%, rgba(24,24,27,0.8) 100%); border-color: rgba(205,127,50,0.2); }
        tr.rank-3 .rank-badge { background: linear-gradient(135deg, #edb078 0%, #b85c15 100%); color: #fff; border: none; font-size: 1.3rem; box-shadow: 0 0 15px rgba(205,127,50,0.3); }
        tr.rank-3 .player-name { color: var(--bronze); font-size: 1.1rem; }

        .player-name { font-weight: 800; color: #fff; font-size: 1.1rem; display: flex; align-items: center; gap: 12px; }
        .player-handle { font-size: 0.85rem; color: rgba(255,255,255,0.4); font-weight: 500; font-family: 'Inter', sans-serif; letter-spacing: 0.5px; }

        .rating-col { color: rgba(255,255,255,0.6); font-weight: 600; font-family: 'Outfit', sans-serif; letter-spacing: 1px; font-size: 1.1rem; }

        .status-badge {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; padding: 6px 14px; border-radius: 8px;
            font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
        }

        .status-won    { color: #10b981; border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.08); box-shadow: 0 0 20px rgba(16,185,129,0.15); }
        .status-draw   { color: #f59e0b; border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); box-shadow: 0 0 20px rgba(245,158,11,0.15); }
        .status-lose   { color: #ef4444; border-color: rgba(239,68,68,0.2); background: rgba(239,68,68,0.05); }
        .status-active { color: #3b82f6; border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.08); box-shadow: 0 0 20px rgba(59,130,246,0.15); }

        .pts-col { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        tr.rank-1 .pts-col { color: var(--gold); text-shadow: 0 0 20px rgba(212,175,55,0.5); }
        tr.rank-2 .pts-col { color: var(--silver); }
        tr.rank-3 .pts-col { color: var(--bronze); }

        .spinner-ring {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,255,255,0.05); border-top-color: var(--gold);
            border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .hero-section { padding: 50px 16px 20px; margin-bottom: 30px; }
            .hero-section h1 { font-size: 2.2rem; }
            .hero-section p { font-size: 0.9rem; letter-spacing: 2px; }
            
            .leaderboard-container { padding: 0 10px 40px; }
            
            .lb-table-wrapper { overflow-x: auto; padding-bottom: 10px; }
            .lb-table { border-spacing: 0 8px; }
            .lb-table th { padding: 0 12px 6px; font-size: 0.65rem; letter-spacing: 1px; }
            .lb-table td { padding: 12px; }
            
            .lb-table td:first-child { width: 50px; }
            
            .rank-badge { width: 32px; height: 32px; font-size: 0.9rem; border-radius: 10px; }
            tr.rank-1 .rank-badge { font-size: 1.1rem; }
            tr.rank-2 .rank-badge { font-size: 1rem; }
            tr.rank-3 .rank-badge { font-size: 0.95rem; }
            
            .player-name { font-size: 0.95rem; gap: 6px; }
            tr.rank-1 .player-name { font-size: 1.05rem; }
            .player-handle { display: none; }
            
            .rating-col { font-size: 0.95rem; }
            
            .status-badge { padding: 4px 8px; font-size: 0.65rem; letter-spacing: 0.5px; }
            .status-badge i { display: none; } /* hide the dot to save space */
            
            .pts-col { font-size: 1.2rem; }
        }

        @media (max-width: 480px) {
            .hero-section h1 { font-size: 1.8rem; margin-bottom: 4px; }
            .hero-section p { font-size: 0.75rem; }
            .rating-col, .rating-header { display: none; } /* Hide rating entirely on tiny screens */
            .lb-table td { padding: 10px 8px; }
            .lb-table th { padding: 0 8px 6px; }
            .status-badge { font-size: 0.6rem; padding: 4px 6px; }
            .player-name { font-size: 0.85rem; }
            .pts-col { font-size: 1.1rem; }
            .rank-badge { width: 28px; height: 28px; font-size: 0.8rem; border-radius: 8px; }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1><i class="fas fa-chess" style="color:#d4af37; margin-right:16px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);"></i>Leaderboard</h1>
        <p>Live Tournament Standings</p>
    </div>

    <div class="leaderboard-container">

        <!-- Loading state -->
        <div id="loading" style="text-align:center; padding:50px;">
            <div class="spinner-ring"></div>
            <p id="loadingText" style="color:#71717a; font-size:13px; margin-top:16px;">Connecting to Firebase...</p>
        </div>

        <!-- Leaderboard closed / error -->
        <div id="closedLayout" class="closed-overlay" style="display:none;">
            <i class="fas fa-lock" id="closedIcon"></i>
            <h2 id="closedTitle">Leaderboard Hidden</h2>
            <p id="closedMsg">The admin has not opened the leaderboard for public view yet.</p>
        </div>

        <!-- Leaderboard open -->
        <div id="openLayout" style="display:none;">
            <div class="round-tabs" id="roundTabs"></div>
            <div class="lb-table-wrapper">
                <table class="lb-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Player</th>
                            <th class="rating-header">Rating</th>
                            <th>Points</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="lbTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // db is already declared globally in firebase-config.js — do NOT redeclare here
        let allPlayers = [];
        let activeRoundTab = 1;
        let leaderboardListenerAttached = false;

        function escHtml(unsafe) {
            if (unsafe === null || unsafe === undefined) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ── 1. Timeout: if Firebase doesn't respond in 6s, show error ──
        const loadingTimeout = setTimeout(() => {
            if (document.getElementById('loading').style.display !== 'none') {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('closedIcon').className = 'fas fa-triangle-exclamation';
                document.getElementById('closedIcon').style.color = '#f59e0b';
                document.getElementById('closedTitle').textContent = 'Firebase Rules Not Deployed';
                document.getElementById('closedMsg').innerHTML = `
                    Firebase Console mein rules deploy nahi hui hain.<br><br>
                    <strong style="color:#c6a87c;">Fix karo:</strong><br>
                    1. <a href="https://console.firebase.google.com" target="_blank" style="color:#3b82f6;">console.firebase.google.com</a> jao<br>
                    2. Project → Firestore → <strong>Rules</strong> tab<br>
                    3. <code style="background:#111; padding:2px 6px; border-radius:4px; font-size:11px;">allow read: if docId == "global"</code> wali rules paste karo<br>
                    4. <strong>Publish</strong> karo
                `;
                document.getElementById('closedLayout').style.display = 'flex';
                document.getElementById('closedLayout').style.textAlign = 'left';
            }
        }, 6000);

        // ── 2. Watch global settings ──────────────────────────────────
        db.collection('settings').doc('global').onSnapshot((doc) => {
            clearTimeout(loadingTimeout);
            document.getElementById('loading').style.display = 'none';

            if (doc.exists && doc.data().isLeaderboardOpen) {
                document.getElementById('closedLayout').style.display = 'none';
                document.getElementById('openLayout').style.display  = 'block';
                startLeaderboardListener();
            } else {
                document.getElementById('closedLayout').style.display = 'flex';
                document.getElementById('openLayout').style.display  = 'none';
            }
        }, (err) => {
            clearTimeout(loadingTimeout);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('closedIcon').className = 'fas fa-triangle-exclamation';
            document.getElementById('closedIcon').style.color = '#ef4444';
            document.getElementById('closedTitle').textContent = 'Permission Denied';
            document.getElementById('closedMsg').innerHTML = `Error: <code style="color:#ef4444;">${escHtml(err.code)}</code> — Firebase Console mein Firestore Rules deploy karo.`;
            document.getElementById('closedLayout').style.display = 'flex';
            console.error('Settings read error:', err.code, err.message);
        });

        // ── 2. Listen for player data ─────────────────────────────────
        function startLeaderboardListener() {
            if (leaderboardListenerAttached) return; // prevent duplicate listeners
            leaderboardListenerAttached = true;

            db.collection('registrations').onSnapshot((snapshot) => {
                allPlayers = [];
                snapshot.forEach(doc => allPlayers.push(doc.data()));
                renderTabsAndData();
            }, (err) => {
                console.error('Registrations read error:', err.code, err.message);
                document.getElementById('lbTableBody').innerHTML =
                    `<tr><td colspan="5" style="text-align:center;padding:30px;color:#ef4444;">
                        <i class="fas fa-exclamation-circle"></i> Failed to load data.<br>
                        <small style="color:#71717a;">Error: ${escHtml(err.message)}</small>
                    </td></tr>`;
            });
        }

        // ── 3. Render round tabs + table ─────────────────────────────
        function renderTabsAndData() {
            if (allPlayers.length === 0) {
                document.getElementById('roundTabs').innerHTML = '';
                document.getElementById('lbTableBody').innerHTML =
                    '<tr><td colspan="5" style="text-align:center;padding:30px;color:#71717a;">No players registered yet.</td></tr>';
                return;
            }

            // Find the highest round any player has reached
            let maxRound = 1;
            allPlayers.forEach(p => {
                const r = p.currentRound || 1;
                if (r > maxRound) maxRound = r;
            });

            if (activeRoundTab > maxRound) activeRoundTab = maxRound;

            // Build tabs
            const tabsEl = document.getElementById('roundTabs');
            tabsEl.innerHTML = '';
            for (let i = 1; i <= maxRound; i++) {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (i === activeRoundTab ? ' active' : '');
                btn.textContent = 'Round ' + i;
                btn.onclick = () => { activeRoundTab = i; renderTabsAndData(); };
                tabsEl.appendChild(btn);
            }

            // Filter players who've reached the active round
            let players = allPlayers.filter(p => (p.currentRound || 1) >= activeRoundTab);

            // Sort: most points first, then highest rating
            players.sort((a, b) => {
                const pa = parseFloat(a.points) || 0;
                const pb = parseFloat(b.points) || 0;
                if (pb !== pa) return pb - pa;
                return (parseInt(b.rating) || 0) - (parseInt(a.rating) || 0);
            });

            const tbody = document.getElementById('lbTableBody');
            tbody.innerHTML = '';

            if (players.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:#71717a;">No players have reached this round yet.</td></tr>';
                return;
            }

            players.forEach((p, index) => {
                const statusMap  = p.matchStatus || {};
                const statusVal  = statusMap[activeRoundTab];
                const totalPts   = parseFloat(p.points || 0);

                let badgeClass = 'status-active', badgeText = 'Playing';
                if (statusVal === 'won')  { badgeClass = 'status-won';  badgeText = 'Won'; }
                if (statusVal === 'draw') { badgeClass = 'status-draw'; badgeText = 'Draw'; }
                if (statusVal === 'lose') { badgeClass = 'status-lose'; badgeText = 'Eliminated'; }

                const rankIndicator = index < 3 ? ['1','2','3'][index] : index + 1;
                const rowClass  = index < 3 ? `rank-${index + 1}` : '';
                const animDelay = index * 0.05; // Staggered fade in

                tbody.innerHTML += `
                    <tr class="${rowClass}" style="animation-delay: ${animDelay}s">
                        <td><div class="rank-badge">${index < 3 ? (index===0?'<i class="fas fa-trophy"></i>':index===1?'<i class="fas fa-medal"></i>':'<i class="fas fa-award"></i>') : rankIndicator}</div></td>
                        <td>
                            <div class="player-name">
                                ${escHtml(p.name || 'Unknown')}
                                ${p.username ? `<span class="player-handle">@${escHtml(p.username)}</span>` : ''}
                            </div>
                        </td>
                        <td class="rating-col">${escHtml(String(p.rating || '—'))}</td>
                        <td class="pts-col">${totalPts}</td>
                        <td><span class="status-badge ${badgeClass}"><i class="fas fa-circle" style="font-size:8px;"></i> ${badgeText}</span></td>
                    </tr>`;
            });
        }
    </script>
</body>
</html>
